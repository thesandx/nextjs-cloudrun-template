name: CodeQL

# Static application security testing. Runs on PRs so findings block review,
# and weekly so newly published queries are applied to code that has not
# changed. Results land in the Security tab.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Mondays 03:17 UTC. Off the hour to avoid GitHub's scheduling stampede.
    - cron: "17 3 * * 1"
  # On-demand re-run, without needing an empty commit. Useful after enabling
  # code scanning on a repository, or to re-check a branch against newly
  # published queries.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      security-events: write # required to upload SARIF results
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # `security-and-quality` adds maintainability queries on top of the
          # default security set. Drop to `security-extended` if the noise
          # outweighs the value on a given project.
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
