version: 2

updates:
  # ---------------------------------------------------------------------------
  # Application dependencies
  # ---------------------------------------------------------------------------
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Singapore
    open-pull-requests-limit: 5
    versioning-strategy: increase
    # Grouping keeps the PR queue reviewable: one PR for all patch bumps beats
    # fifteen. Majors stay separate because they need real review.
    groups:
      next:
        patterns: ["next", "eslint-config-next", "@next/*"]
      react:
        patterns: ["react", "react-dom", "@types/react", "@types/react-dom"]
      dev-dependencies:
        dependency-type: development
        update-types: [minor, patch]
      production-patches:
        dependency-type: production
        update-types: [patch]
    labels: [dependencies]
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"

  # ---------------------------------------------------------------------------
  # GitHub Actions — pinned action versions go stale silently and are a real
  # supply-chain surface. Keep them current.
  # ---------------------------------------------------------------------------
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns: ["*"]
    labels: [dependencies, ci]
    commit-message:
      prefix: "chore(ci)"

  # ---------------------------------------------------------------------------
  # Base image — a stale Node/Alpine base is the most common source of
  # inherited CVEs in a container.
  # ---------------------------------------------------------------------------
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, docker]
    commit-message:
      prefix: "chore(docker)"
